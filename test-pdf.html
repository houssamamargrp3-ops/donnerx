<!DOCTYPE html><html><head><script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script></head><body><div id="test">Hello World</div><script>window.onload = function() { try { var element = document.getElementById("test"); html2pdf().set({filename: "test.pdf"}).from(element).save().then(() => console.log("SUCCESS")).catch(e => console.error("PROMISE ERROR:", e)); } catch(e) { console.error("SYNC ERROR:", e); } }</script></body></html>
